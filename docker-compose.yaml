version: '3.8'

services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "50051:50051"
    networks:
      - fun-wheel-network

  telegram-bot:
    build:
      context: .
      dockerfile: bot/Dockerfile
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
    depends_on:
      - server
    networks:
      - fun-wheel-network

  web:
    image: nginx:alpine
    volumes:
      - ./index.html:/usr/share/nginx/html/index.html:ro
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - fun-wheel-network

networks:
  fun-wheel-network:
    driver: bridge 