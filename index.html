<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Wheel</title>
    <script src="https://cdn.jsdelivr.net/npm/google-protobuf@3/google-protobuf.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/grpc-web@1.4.2/dist/grpc-web.js"></script>
    <script>
        function checkScriptsLoaded() {
            console.log('Checking if proto is loaded:', typeof proto !== 'undefined');
            if (typeof proto === 'undefined') {
                console.error('Proto namespace not loaded');
                return false;
            }
            console.log('Proto namespace available:', proto);
            return true;
        }
    </script>
    <script src="/js/funwheel_pb.js" onload="console.log('funwheel_pb.js loaded')" onerror="console.error('Failed to load funwheel_pb.js')"></script>
    <script src="/js/funwheel_grpc_web_pb.js" onload="console.log('funwheel_grpc_web_pb.js loaded')" onerror="console.error('Failed to load funwheel_grpc_web_pb.js')"></script>
    <style>
        .wheel-container {
            display: none;
            margin: 20px auto;
            width: 400px;
            height: 400px;
            position: relative;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid black;
            position: relative;
            transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            background-color: #f0f0f0;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .wheel-section {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            clip-path: polygon(100% 50%, 0 0, 0 100%);
        }

        .input-container {
            display: none;
            margin: 20px;
            text-align: center;
        }

        .option-input {
            padding: 10px;
            margin-right: 10px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .result {
            margin: 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .controls {
            text-align: center;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Колесо Фортуны</h1>
    <div class="controls">
        <button onclick="createWheel()">Создать колесо</button>
    </div>
    <div class="input-container" id="inputContainer">
        <input type="text" class="option-input" id="optionInput" placeholder="Введите вариант">
        <button onclick="addOption()">Добавить вариант</button>
    </div>
    <div class="wheel-container" id="wheelContainer">
        <div class="wheel" id="wheel"></div>
    </div>
    <div class="controls">
        <button onclick="spinWheel()" id="spinButton" style="display: none;">Крутить!</button>
    </div>
    <div class="result" id="result"></div>

    <script>
        let client;
        let options = [];
        let spinning = false;

        window.addEventListener('load', function() {
            console.log('Loading gRPC client...');
            try {
                client = new proto.funwheel.FunWheelServiceClient('http://localhost:50051');
                console.log('gRPC client loaded successfully');
            } catch (e) {
                console.error('Failed to create gRPC client:', e);
            }
        });

        function createWheel() {
            if (!client) {
                console.error('gRPC client not initialized');
                alert('Ошибка: клиент не инициализирован');
                return;
            }

            console.log('Creating wheel...');
            try {
                const request = new proto.funwheel.CreateWheelRequest();
                request.setChatId(123);
                console.log('Request created:', request);

                client.createWheel(request, {}, (err, response) => {
                    console.log('Got response:', err, response);
                    if (err) {
                        console.error('Error:', err);
                        alert('Ошибка при создании колеса: ' + err.message);
                        return;
                    }
                    document.getElementById('wheelContainer').style.display = 'block';
                    document.getElementById('inputContainer').style.display = 'block';
                    document.getElementById('spinButton').style.display = 'block';
                    options = [];
                    updateWheel();
                });
            } catch (e) {
                console.error('Error in createWheel:', e);
                alert('Ошибка при создании колеса: ' + e.message);
            }
        }

        function addOption() {
            const option = document.getElementById('optionInput').value.trim();
            if (!option) {
                alert('Пожалуйста, введите вариант');
                return;
            }

            const request = new proto.funwheel.AddOptionRequest();
            request.setChatId(123);
            request.setOption(option);

            client.addOption(request, {}, (err, response) => {
                if (err) {
                    console.error('Error:', err);
                    alert('Ошибка при добавл��нии варианта: ' + err.message);
                    return;
                }
                options.push(option);
                document.getElementById('optionInput').value = '';
                updateWheel();
            });
        }

        function updateWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            
            if (options.length === 0) {
                wheel.style.backgroundColor = '#f0f0f0';
                return;
            }

            const sectionAngle = 360 / options.length;
            options.forEach((option, index) => {
                const section = document.createElement('div');
                section.className = 'wheel-section';
                section.style.transform = `rotate(${index * sectionAngle}deg)`;
                section.style.backgroundColor = `hsl(${index * (360 / options.length)}, 70%, 50%)`;
                section.textContent = option;
                wheel.appendChild(section);
            });
        }

        function spinWheel() {
            if (spinning || options.length === 0) {
                alert(options.length === 0 ? 'Добавьте варианты перед вращением!' : 'Колесо уже крутится!');
                return;
            }
            
            spinning = true;
            document.getElementById('result').textContent = '';

            const request = new proto.funwheel.SpinWheelRequest();
            request.setChatId(123);

            client.spinWheel(request, {}, (err, response) => {
                if (err) {
                    console.error('Error:', err);
                    alert('Ошибка при вращении колеса: ' + err.message);
                    spinning = false;
                    return;
                }

                const wheel = document.getElementById('wheel');
                const resultIndex = options.indexOf(response.getResult());
                const extraSpins = 5;
                const targetAngle = -(360 * extraSpins + (resultIndex * (360 / options.length)));
                
                wheel.style.transform = `rotate(${targetAngle}deg)`;
                
                setTimeout(() => {
                    document.getElementById('result').textContent = `Результат: ${response.getResult()}`;
                    spinning = false;
                }, 3000);
            });
        }

        document.getElementById('optionInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addOption();
            }
        });
    </script>
</body>
</html>
