<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Wheel</title>
    <style>
        .wheel-container {
            margin: 20px auto;
            width: 400px;
            height: 400px;
            position: relative;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid black;
            position: relative;
            transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            background-color: #f0f0f0;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .wheel-section {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            clip-path: polygon(100% 50%, 0 0, 0 100%);
        }

        .input-container {
            margin: 20px;
            text-align: center;
        }

        .option-input {
            padding: 10px;
            margin-right: 10px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .result {
            margin: 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .controls {
            text-align: center;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Колесо Фортуны</h1>
    <div class="input-container">
        <input type="text" class="option-input" id="optionInput" placeholder="Введите вариант" required>
        <button onclick="addOption()">Добавить вариант</button>
    </div>
    <div class="wheel-container">
        <div class="wheel" id="wheel"></div>
    </div>
    <div class="controls">
        <button onclick="spinWheel()">Крутить!</button>
    </div>
    <div class="result" id="result"></div>

    <script>
        const wheelId = window.location.pathname.split('/').pop();
        let options = [];
        let spinning = false;

        function addOption() {
            const input = document.getElementById('optionInput');
            const option = input.value.trim();
            
            if (!option) {
                alert('Пожалуйста, введите вариант');
                return;
            }

            fetch(`/api/wheel/${wheelId}/option`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ option: option })
            })
            .then(response => response.json())
            .then(data => {
                options.push(option);
                input.value = '';
                updateWheel();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Ошибка при добавлении варианта');
            });
        }

        function updateWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            
            if (options.length === 0) {
                wheel.style.backgroundColor = '#f0f0f0';
                return;
            }

            const sectionAngle = 360 / options.length;
            options.forEach((option, index) => {
                const section = document.createElement('div');
                section.className = 'wheel-section';
                section.style.transform = `rotate(${index * sectionAngle}deg)`;
                section.style.backgroundColor = `hsl(${index * (360 / options.length)}, 70%, 50%)`;
                section.textContent = option;
                wheel.appendChild(section);
            });
        }

        function spinWheel() {
            if (spinning || options.length === 0) {
                alert(options.length === 0 ? 'Добавьте варианты перед вращением!' : 'Колесо уже крутится!');
                return;
            }
            
            spinning = true;
            document.getElementById('result').textContent = '';

            fetch(`/api/wheel/${wheelId}/spin`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                const wheel = document.getElementById('wheel');
                const resultIndex = options.indexOf(data.result);
                const extraSpins = 5;
                const targetAngle = -(360 * extraSpins + (resultIndex * (360 / options.length)));
                
                wheel.style.transform = `rotate(${targetAngle}deg)`;
                
                setTimeout(() => {
                    document.getElementById('result').textContent = `Результат: ${data.result}`;
                    spinning = false;
                }, 3000);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Ошибка при вращении колеса');
                spinning = false;
            });
        }

        document.getElementById('optionInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addOption();
            }
        });

        // Загружаем существующие опции при открытии страницы
        fetch(`/api/wheel/${wheelId}`)
            .then(response => response.json())
            .then(data => {
                options = data.options;
                updateWheel();
            });
    </script>
</body>
</html>
