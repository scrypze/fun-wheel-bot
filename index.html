<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Wheel</title>
    <style>
        .wheel-container {
            display: none;
            margin: 20px auto;
            width: 400px;
            height: 400px;
            position: relative;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid black;
            position: relative;
            transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }

        .wheel-section {
            position: absolute;
            width: 50%;
            height: 50%;
            transform-origin: 100% 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: white;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
        }

        .input-container {
            display: none;
            margin: 20px;
        }

        .option-input {
            padding: 10px;
            margin-right: 10px;
        }

        .result {
            margin: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Fun Wheel</h1>
    <button onclick="createWheel()">Создать колесо</button>
    <div class="input-container" id="inputContainer">
        <input type="text" class="option-input" id="optionInput" placeholder="Enter option">
        <button onclick="addOption()">Добавить вариант</button>
    </div>
    <div class="wheel-container" id="wheelContainer">
        <div class="wheel" id="wheel"></div>
    </div>
    <button onclick="spinWheel()">Пуск</button>
    <div class="result" id="result"></div>

    <script src="https://github.com/improbable-eng/grpc-web/releases/download/v0.15.0/grpc-web-client.js"></script>
    <script>
        let options = [];
        let spinning = false;

        function createWheel() {
            const client = new grpc.web.GrpcWebClientBase();
            const service = new proto.funwheel.FunWheelService(client);
            
            const request = new proto.funwheel.CreateWheelRequest();
            request.setChatId(123);

            service.createWheel(request, {}, (err, response) => {
                if (err) {
                    console.error('Error:', err);
                    return;
                }
                console.log('Success:', response.getMessage());
                document.getElementById('wheelContainer').style.display = 'block';
                document.getElementById('inputContainer').style.display = 'block';
                options = [];
                updateWheel();
            });
        }

        function addOption() {
            const option = document.getElementById('optionInput').value;
            if (!option) return;

            console.log('Adding option:', option);
            fetch('http://localhost:50051/v1/addoption', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ chat_id: 123, option: option })
            })
            .then(response => {
                console.log('Response status:', response.status);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Success:', data);
                options.push(option);
                document.getElementById('optionInput').value = '';
                updateWheel();
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Ошибка при добавлении опции: ' + error.message);
            });
        }

        function updateWheel() {
            const wheel = document.getElementById('wheel');
            wheel.innerHTML = '';
            
            const sectionAngle = 360 / options.length;
            options.forEach((option, index) => {
                const section = document.createElement('div');
                section.className = 'wheel-section';
                section.style.transform = `rotate(${index * sectionAngle}deg)`;
                section.style.backgroundColor = `hsl(${index * (360 / options.length)}, 70%, 50%)`;
                section.textContent = option;
                wheel.appendChild(section);
            });
        }

        function spinWheel() {
            if (spinning || options.length === 0) {
                alert('Нельзя крутить: ' + (spinning ? 'колесо уже крутится' : 'нет опций'));
                return;
            }
            
            spinning = true;
            console.log('Spinning wheel...');

            fetch('http://localhost:50051/v1/spinwheel', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ chat_id: 123 })
            })
            .then(response => {
                console.log('Response status:', response.status);
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                console.log('Success:', data);
                const wheel = document.getElementById('wheel');
                const resultIndex = options.indexOf(data.result);
                const extraSpins = 5;
                const targetAngle = -(360 * extraSpins + (resultIndex * (360 / options.length)));
                
                wheel.style.transform = `rotate(${targetAngle}deg)`;
                
                setTimeout(() => {
                    document.getElementById('result').textContent = `Результат: ${data.result}`;
                    spinning = false;
                }, 3000);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('Ошибка при вращении колеса: ' + error.message);
                spinning = false;
            });
        }

        document.getElementById('optionInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addOption();
            }
        });
    </script>
</body>
</html>
