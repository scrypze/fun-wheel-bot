<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fun Wheel</title>
    <style>
        .wheel-container {
            margin: 20px auto;
            width: 400px;
            height: 400px;
            position: relative;
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid black;
            position: relative;
            background-color: #f0f0f0;
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }

        .input-container {
            margin: 20px;
            text-align: center;
        }

        .option-input {
            padding: 10px;
            margin-right: 10px;
            width: 200px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        .result {
            margin: 20px;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }

        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
        }

        button:hover {
            background-color: #45a049;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .controls {
            text-align: center;
            margin: 20px;
        }
    </style>
</head>
<body>
    <h1>Колесо Фортуны</h1>
    <div class="input-container">
        <form action="http://scrypze.ru:50051/v1/addoption" method="POST">
            <input type="text" class="option-input" name="option" placeholder="Введите вариант" required>
            <button type="submit">Добавить вариант</button>
        </form>
    </div>
    <div class="wheel-container">
        <div class="wheel"></div>
    </div>
    <div class="controls">
        <form action="http://scrypze.ru:50051/v1/spinwheel" method="POST">
            <button type="submit">Крутить!</button>
        </form>
    </div>
    <div class="result"></div>
</body>
</html>
